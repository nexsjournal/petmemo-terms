<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetMemo 法律文档</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #1f2329;
      background: #f5f6f8;
    }
    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 44px 20px 28px;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: 0.4px;
    }
    .subtitle {
      margin: 10px 0 34px;
      font-size: clamp(17px, 2.5vw, 26px);
      color: #666f7a;
    }
    .cards {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .doc-card {
      background: #fff;
      border: 1px solid #eceef2;
      border-radius: 14px;
      padding: 24px 24px 22px;
      text-decoration: none;
      color: #1f2329;
      box-shadow: 0 3px 10px rgba(17, 24, 39, 0.06);
      min-height: 168px;
      box-sizing: border-box;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .doc-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.12);
    }
    .icon {
      font-size: 30px;
      line-height: 1;
      margin-bottom: 16px;
      display: block;
    }
    .doc-title {
      margin: 0;
      font-size: clamp(24px, 3.2vw, 32px);
      font-weight: 700;
      line-height: 1.2;
    }
    .doc-desc {
      margin: 10px 0 0;
      font-size: clamp(15px, 2vw, 19px);
      line-height: 1.5;
      color: #606b79;
    }
    footer {
      margin-top: auto;
      text-align: center;
      padding-top: 44px;
      color: #647083;
      font-size: clamp(14px, 1.8vw, 18px);
      line-height: 1.6;
    }
    .github-link {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      color: #1664ff;
    }
    @media (max-width: 900px) {
      .page { padding-top: 34px; }
      .cards { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .page { padding: 26px 14px 20px; }
      .subtitle { margin-bottom: 22px; }
      .doc-card { min-height: auto; padding: 18px 16px 16px; }
      .icon { font-size: 24px; margin-bottom: 10px; }
      footer { padding-top: 26px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>PetMemo</h1>
    <p class="subtitle">法律文档与隐私政策</p>

    <div class="cards">
      <a class="doc-card" href="privacy-policy.html">
        <span class="icon">🔒</span>
        <h2 class="doc-title">隐私政策</h2>
        <p class="doc-desc">了解我们如何收集、使用和保护您与毛孩子的信息</p>
      </a>
      <a class="doc-card" href="terms-of-service.html">
        <span class="icon">📋</span>
        <h2 class="doc-title">用户协议</h2>
        <p class="doc-desc">使用 PetMemo 应用的条款和条件</p>
      </a>
    </div>

    <footer>
      <p>最后更新：2026 年 6 月 12 日</p>
      <a class="github-link" href="https://github.com/nexsjournal/petmemo-terms">GitHub 仓库</a>
    </footer>
  </div>
</body>
</html>
